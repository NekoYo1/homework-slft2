global
    log /dev/log local0
    maxconn 4096
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend http-in
    bind *:80
    default_backend servers_roundrobin

backend servers_roundrobin
    balance roundrobin
    server s1 127.0.0.1:8001 check
    server s2 127.0.0.1:8002 check
