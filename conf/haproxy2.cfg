global
    log /dev/log local0
    maxconn 4096
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode http
    option httplog
    option forwardfor except 127.0.0.1
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend http-in
    bind *:80
    mode http

    acl is_example hdr_dom(host) -i example.local
    use_backend weighted_servers if is_example
    default_backend default_reject

backend weighted_servers
    mode http
    balance roundrobin
    server s3 127.0.0.1:8003 weight 2 check
    server s4 127.0.0.1:8004 weight 3 check
    server s5 127.0.0.1:8005 weight 4 check

backend default_reject
    mode http
    http-request deny deny_status 503
